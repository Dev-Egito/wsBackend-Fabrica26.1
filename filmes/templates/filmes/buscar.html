<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Filme</title>
</head>
<body>
    <h1>Buscar Filme</h1>

    <form method="get">
        <input type="text" name="titulo" placeholder="Digite o nome do filme">
        <button type="submit">Buscar</button>
    </form>

    {% if filme %}
        <h2>{{ filme.Title }}</h2>
        <p>Ano: {{ filme.Year }}</p>
        <p>Gênero: {{ filme.Genre }}</p>
        <img src="{{ filme.Poster }} " alt="Poster">
    {% endif %}
    
</body>
</html>
