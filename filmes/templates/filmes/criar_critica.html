<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineScope — Avaliar</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e8e8f0; font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

        nav { padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.07); font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.08em; color: #e8c547; }
        nav span { color: #e8e8f0; }

        .container { max-width: 520px; margin: 0 auto; padding: 60px 24px; }

        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 0.04em; line-height: 1.05; margin-bottom: 8px; }
        h1 span { color: #6b6b80; font-size: 1.8rem; }

        .sub { font-size: 0.75rem; color: #e8c547; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 40px; }

        label { display: block; font-size: 0.78rem; color: #6b6b80; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

        textarea, input[type="number"] { width: 100%; background: #18181f; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 13px 18px; color: #e8e8f0; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; outline: none; margin-bottom: 24px; }
        textarea { resize: vertical; min-height: 130px; line-height: 1.6; }
        textarea:focus, input[type="number"]:focus { border-color: #e8c547; }
        textarea::placeholder, input::placeholder { color: #6b6b80; }

        button { width: 100%; background: #e8c547; color: #0a0a0f; border: none; border-radius: 8px; padding: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<nav>Cine<span>Scope</span></nav>

<div class="container">
    <p class="sub">Nova crítica</p>
    <h1>Avaliar<br><span>{{ filme.titulo }}</span></h1>

    <form method="post">
        {% csrf_token %}

        <label for="comentarios">Seu comentário</label>
        <textarea id="comentarios" name="comentarios" placeholder="O que você achou deste filme?" required></textarea>

        <label for="nota">Nota (1 a 5)</label>
        <input type="number" id="nota" name="nota" min="1" max="5" placeholder="Ex: 4" required>

        <button type="submit">Publicar crítica</button>
    </form>
</div>

</body>
</html>
